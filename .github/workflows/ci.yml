name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  check:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Spotless check
        run: ./gradlew spotlessCheck
      - name: Desktop tests
        run: ./gradlew :spooler:desktopTest
      - name: Compile remaining platforms
        run: ./gradlew :spooler:compileAndroidMain :spooler:compileKotlinJs :spooler:compileKotlinWasmJs
